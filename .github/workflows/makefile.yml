name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find gradlew and make executable
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          echo "GRADLEW=./gradlew" >> $GITHUB_ENV
          echo "Found gradlew at repository root"
        elif [ -f "./app/gradlew" ]; then
          chmod +x ./app/gradlew
          echo "GRADLEW=./app/gradlew" >> $GITHUB_ENV
          echo "Found gradlew at app/gradlew"
        else
          echo "gradlew not found in repository root or app/; aborting"
          ls -la
          exit 1
        fi

    - name: Build APK
      run: $GRADLEW assembleRelease

    - name: Build AAB
      run: $GRADLEW bundleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release.aab
        path: app/build/outputs/bundle/release/app-release.aab
